<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIGIM-MTZ | Portal Ciudadano</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-body-tertiary">

  <nav class="navbar topbar-mtz sticky-top bg-dark shadow-sm">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <img src="./assets/escudo.png" class="logo-box bg-white p-1 rounded" style="width: 40px;" alt="Escudo">
        <div><div class="text-white fw-bold fs-5 lh-1">SIGIM-MTZ <span class="badge bg-primary ms-2 fs-6">Ciudadano</span></div></div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light btn-sm fw-bold btn-pill ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral"><i class="bi bi-list"></i></button>
      </div>
    </div>
  </nav>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="menuLateral">
    <div class="offcanvas-header"><h5 class="offcanvas-title fw-bold"><i class="bi bi-building"></i> Menú</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body">
      <div class="list-group mb-3">
        <a href="dashboard.html" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2"></i> Panel de incidencias</a>
        <a href="reportes.html" class="list-group-item list-group-item-action"><i class="bi bi-clipboard-data"></i> Reportes Estadísticos</a>
        <a href="usuarios.html" class="list-group-item list-group-item-action"><i class="bi bi-people"></i> Usuarios</a>
        <a href="cuidadano.html" class="list-group-item list-group-item-action active"><i class="bi bi-megaphone"></i> Portal Ciudadano</a>
      </div>
      <hr>
      <div class="small text-secondary"><a href="index.html" class="text-danger fw-bold text-decoration-none"><i class="bi bi-box-arrow-right"></i> Ir a Inicio de Sesión</a></div>
    </div>
  </div>

  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="text-center mb-4"><h2 class="fw-bold">Reporte de Incidencias</h2><p class="text-secondary">Ayuntamiento de Martínez de la Torre, Veracruz.</p></div>

        <div class="card border-0 shadow-sm p-4 mb-5">
          <h5 class="fw-bold mb-4 border-bottom pb-2"><i class="bi bi-megaphone text-primary"></i> Levantar un nuevo reporte</h5>
          <form id="form-ciudadano">
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label fw-bold small">Nombre Completo</label><input type="text" class="form-control" id="ciu-nombre" required></div>
              <div class="col-md-6"><label class="form-label fw-bold small">Teléfono</label><input type="tel" class="form-control" id="ciu-telefono" required></div>
              <div class="col-md-6">
                <label class="form-label fw-bold small">Tipo de Servicio</label>
                <select class="form-select" id="ciu-servicio" required><option value="">Seleccione...</option><option value="1">Alumbrado Público</option><option value="2">Bacheo</option><option value="3">Basura</option><option value="4">Drenaje</option></select>
              </div>
              <div class="col-md-6"><label class="form-label fw-bold small">Dirección exacta</label><input type="text" class="form-control" id="ciu-direccion" required></div>
              <div class="col-12"><label class="form-label fw-bold small">Descripción</label><textarea class="form-control" id="ciu-descripcion" rows="3" required></textarea></div>
              <div class="col-12"><label class="form-label fw-bold small text-secondary"><i class="bi bi-camera"></i> Foto (Opcional)</label><input type="file" class="form-control" id="ciu-evidencia" accept="image/*"></div>
              <div class="col-12 mt-4 text-center"><button type="submit" id="btn-enviar-reporte" class="btn btn-primary btn-pill px-5 py-2 fw-bold"><i class="bi bi-send"></i> Enviar</button></div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="modalExito" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content text-center p-4 border-0 shadow"><div class="modal-body"><i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i><h4 class="fw-bold mt-3">¡Reporte Enviado!</h4><div class="bg-light border rounded p-3 my-3"><div class="small fw-bold">Tu Folio:</div><div class="fs-2 fw-bold text-primary" id="txt-folio-generado">INC-000</div></div><button type="button" class="btn btn-primary btn-pill" onclick="window.location.reload()">Aceptar</button></div></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/ciudadano.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIGIM-MTZ | Reportes Estadísticos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar topbar-mtz sticky-top bg-dark shadow-sm">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <img src="./assets/escudo.png" class="logo-box bg-white p-1 rounded" style="width: 40px;" alt="Escudo">
        <div><div class="text-white fw-bold fs-5 lh-1">SIGIM-MTZ</div></div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <div class="dropdown">
          <button class="btn btn-dark dropdown-toggle border-0 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
            <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" class="rounded-circle" width="32" alt="Avatar">
            <span class="d-none d-md-inline small">Administrador</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow">
            <li><a class="dropdown-item" href="perfil.html"><i class="bi bi-person"></i> Mi Perfil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="index.html"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a></li>
          </ul>
        </div>
        <button class="btn btn-light btn-sm fw-bold btn-pill ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral"><i class="bi bi-list"></i></button>
      </div>
    </div>
  </nav>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="menuLateral">
    <div class="offcanvas-header"><h5 class="offcanvas-title fw-bold"><i class="bi bi-building"></i> Menú</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body">
      <div class="list-group mb-3">
        <a href="dashboard.html" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2"></i> Panel de incidencias</a>
        <a href="reportes.html" class="list-group-item list-group-item-action active"><i class="bi bi-clipboard-data"></i> Reportes Estadísticos</a>
        <a href="usuarios.html" class="list-group-item list-group-item-action"><i class="bi bi-people"></i> Usuarios</a>
        <a href="cuidadano.html" class="list-group-item list-group-item-action"><i class="bi bi-megaphone"></i> Portal Ciudadano</a>
      </div>
    </div>
  </div>

  <main class="container py-4">
    <nav aria-label="breadcrumb" class="mb-3"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><i class="bi bi-house-door"></i> Inicio</li><li class="breadcrumb-item active">Reportes Estadísticos</li></ol></nav>
    <section class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <form id="form-filtros" class="row g-3 align-items-end">
          <div class="col-md-3"><label class="form-label fw-bold small">Fecha Inicio</label><input type="date" class="form-control" id="filtro-inicio" required></div>
          <div class="col-md-3"><label class="form-label fw-bold small">Fecha Fin</label><input type="date" class="form-control" id="filtro-fin" required></div>
          <div class="col-md-2"><button type="submit" class="btn btn-primary w-100"><i class="bi bi-funnel"></i> Filtrar</button></div>
          <div class="col-md-4 text-end"><button type="button" class="btn btn-outline-success"><i class="bi bi-file-earmark-pdf"></i> Exportar PDF</button></div>
        </form>
      </div>
    </section>

    <div class="row g-4 mb-4">
      <div class="col-12 col-lg-8"><div class="card border-0 shadow-sm h-100"><div class="card-header bg-white py-3"><h6 class="mb-0 fw-bold">Rendimiento por Técnico</h6></div><div class="card-body"><canvas id="chartTecnicos" style="max-height: 350px;"></canvas></div></div></div>
      <div class="col-12 col-lg-4"><div class="card border-0 shadow-sm h-100"><div class="card-header bg-white py-3"><h6 class="mb-0 fw-bold">Cumplimiento SLA (< 24h)</h6></div><div class="card-body d-flex align-items-center justify-content-center"><canvas id="chartSla"></canvas></div></div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/reportes.js"></script>
</body>
</html>

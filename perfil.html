<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIGIM-MTZ | Mi Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-body-tertiary">
  <nav class="navbar topbar-mtz sticky-top bg-dark shadow-sm">
    <div class="container d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-3">
        <img src="./assets/escudo.png" class="logo-box bg-white p-1 rounded" style="width: 40px;" alt="Escudo">
        <div class="text-white fw-bold fs-5 lh-1">SIGIM-MTZ</div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <div class="dropdown">
          <button class="btn btn-dark dropdown-toggle border-0 d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown">
            <img src="https://ui-avatars.com/api/?name=Usuario&background=0D8ABC&color=fff" class="rounded-circle" width="32" alt="Avatar">
            <span class="d-none d-md-inline small">Usuario</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow">
            <li><a class="dropdown-item" href="perfil.html"><i class="bi bi-person"></i> Mi Perfil</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="index.html"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a></li>
          </ul>
        </div>
        <button class="btn btn-light btn-sm fw-bold btn-pill ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral"><i class="bi bi-list"></i></button>
      </div>
    </div>
  </nav>

  <div class="offcanvas offcanvas-end" tabindex="-1" id="menuLateral">
    <div class="offcanvas-header"><h5 class="offcanvas-title fw-bold"><i class="bi bi-building"></i> Menú</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body">
      <div class="list-group mb-3">
        <a href="dashboard.html" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2"></i> Panel de incidencias</a>
        <a href="reportes.html" class="list-group-item list-group-item-action"><i class="bi bi-clipboard-data"></i> Reportes Estadísticos</a>
        <a href="usuarios.html" class="list-group-item list-group-item-action"><i class="bi bi-people"></i> Usuarios</a>
        <a href="cuidadano.html" class="list-group-item list-group-item-action"><i class="bi bi-megaphone"></i> Portal Ciudadano</a>
      </div>
    </div>
  </div>

  <main class="container py-4">
    <nav aria-label="breadcrumb" class="mb-3"><ol class="breadcrumb mb-0"><li class="breadcrumb-item"><i class="bi bi-house-door"></i> Inicio</li><li class="breadcrumb-item active" aria-current="page">Mi Perfil</li></ol></nav>
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <div class="text-center mb-4"><img src="https://ui-avatars.com/api/?name=Usuario&background=0D8ABC&color=fff&size=100" class="rounded-circle mb-3" id="img-avatar"><h4 class="fw-bold" id="txt-nombre-perfil">Cargando BD...</h4></div>
            <hr class="mb-4">
            <form id="form-perfil">
              <h6 class="fw-bold mb-3">Actualizar Datos Personales</h6>
              <div class="mb-3"><label class="form-label small fw-bold">Nombre Completo</label><input type="text" class="form-control" id="perfil-nombre" required></div>
              <div class="mb-3"><label class="form-label small fw-bold">Correo Electrónico</label><input type="email" class="form-control bg-light" id="perfil-correo" readonly></div>
              <h6 class="fw-bold mt-4 mb-3">Cambiar Contraseña</h6>
              <div class="mb-3"><label class="form-label small fw-bold">Nueva Contraseña</label><input type="password" class="form-control" id="perfil-pass1"></div>
              <div class="mb-4"><label class="form-label small fw-bold">Confirmar Nueva Contraseña</label><input type="password" class="form-control" id="perfil-pass2"></div>
              <div class="d-grid"><button type="submit" id="btn-guardar-perfil" class="btn btn-primary btn-pill fw-bold py-2"><i class="bi bi-save"></i> Guardar Cambios</button></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/perfil.js"></script>
</body>
</html>
